name: Auth Service CI

on:
  push:
    branches: [main]
    paths:
      - "auth-service/**"
  pull_request:
    branches: [main]

concurrency:
  group: auth-service-ci
  cancel-in-progress: true

jobs:

# =========================
# 1. LINT
# =========================
  lint:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: auth-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run lint
        run: golangci-lint run

# =========================
# 2. UNIT TEST
# =========================
  unit-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: auth-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Run unit tests
        run: go test ./app/service/... -v

# =========================
# 3. INTEGRATION TEST
# =========================
  integration-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: auth-service

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: auth_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            nc -z 127.0.0.1 3306 && echo "MySQL ready" && break
            sleep 2
          done

      - name: Run integration tests
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: root
          DB_NAME: auth_db
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
        run: go test ./test/integration -v

# =========================
# 4. BUILD
# =========================
  build:
    runs-on: ubuntu-latest
    needs: [lint, unit-test, integration-test]

    defaults:
      run:
        working-directory: auth-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Build binary
        run: go build -o app .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: auth-service-binary
          path: auth-service/app