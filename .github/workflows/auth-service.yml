name: Auth Service Full CI/CD (Learning)

on:
  push:
    branches:
      - main
    paths:
      - "auth-service/**"

concurrency:
  group: auth-service-ci
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Go
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      # 3. Run tests (CI)
      - name: Run tests
        run: go test ./...

      # 4. Build binary (simulasi production build)
      - name: Build Go Binary
        run: |
          cd auth-service
          go build -o app .

      # 5. Build Docker image (simulate production packaging)
      - name: Build Docker Image
        run: |
          docker build -t auth-service:local ./auth-service

      # 6. Simulate container run (fake deploy test)
      - name: Simulate Run Container
        run: |
          echo "Starting container simulation..."
          docker run --rm auth-service:local echo "Auth Service Running OK"

      # 7. Login GHCR (simulate artifact registry)
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 8. Push image to registry (real CI/CD step)
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./auth-service
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/auth-service:latest
            ghcr.io/${{ github.repository_owner }}/auth-service:${{ github.sha }}

      # 9. Fake deploy (CD simulation)
      - name: Deploy Simulation (No Server)
        run: |
          echo "=============================="
          echo "DEPLOY STAGE (SIMULATION)"
          echo "Pulling image: ghcr.io/${{ github.repository_owner }}/auth-service:latest"
          echo "Stopping old container..."
          echo "Starting new container..."
          echo "Health check: OK"
          echo "STATUS: DEPLOY SUCCESS (SIMULATED)"
          echo "=============================="